# Netlify config for the client.
# Set "Base directory" to client/ in the Netlify UI, or deploy from this file.

[build]
  base = "client"
  command = "npm run build"
  publish = "dist"

# SPA fallback so client-side routes (react-router) work on refresh.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
